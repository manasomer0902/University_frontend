<!DOCTYPE html>
<html lang="en">
<head>

  <!-- Meta -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Title -->
  <title>Forgot Password</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/forgot_password.css">

  <!-- Favicon -->
  <link rel="icon" href="images/logo.png">

</head>
<body>

<!-- ================= HEADER ================= -->
<header>
  <img src="images/logo.png" alt="University Logo" class="logo">
  <h1>IGNOU University</h1>

  <!-- Menu -->
  <div class="menu">&#x22EE;
    <div class="menu-links">
      <a href="index.html">Home</a>
      <a href="admin.html">Admin</a>
    </div>
  </div>
</header>


<!-- ================= MAIN ================= -->
<main>

  <div class="forgot-container">

    <h2>Forgot Password</h2>
    <p class="subtitle">Enter your email to receive a reset link</p>

    <!-- Form -->
    <form id="forgotForm">

      <input 
        type="email" 
        id="email" 
        placeholder="Enter your email" 
        required
      />

      <button type="submit" class="submit-btn">
        Send Reset Link
      </button>

    </form>

    <!-- Message -->
    <p id="message" class="message-text"></p>

  </div>

</main>


<!-- ================= FOOTER ================= -->
<footer>
  <p>&copy; 2025 IGNOU University. All rights reserved.</p>
</footer>


<!-- ================= JS ================= -->
<script src="js/forgot_password.js"></script>
<script src="js/threedotmenu.js"></script>

</body>
</html>
