<!DOCTYPE html>
<html lang="en">
<head>

  <!-- Meta -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Title -->
  <title>Reset Password</title>

  <!-- CSS (FIXED filename) -->
  <link rel="stylesheet" href="css/reset_password.css" />

  <!-- Favicon -->
  <link rel="icon" href="images/logo.png">

</head>

<body>

<!-- ================= HEADER ================= -->
<header>
  <img src="images/logo.png" alt="University Logo" class="logo" />
  <h1>IGNOU University</h1>

  <!-- Menu (NEW 🔥 for consistency) -->
  <div class="menu">&#x22EE;
    <div class="menu-links">
      <a href="index.html">Home</a>
      <a href="admin.html">Admin</a>
    </div>
  </div>
</header>


<!-- ================= MAIN ================= -->
<main>

  <div class="reset-container">

    <h2>Reset Password</h2>
    <p class="subtitle">Enter your new password below</p>

    <!-- Form -->
    <form id="resetForm">

      <!-- New password -->
      <div class="password-wrapper">
        <input 
          type="password" 
          id="newPassword" 
          placeholder="Enter new password" 
          required 
        />
        <span 
          class="toggle-password" 
          onclick="toggleVisibility('newPassword', this)"
        >👁️</span>
      </div>

      <!-- Confirm password -->
      <div class="password-wrapper">
        <input 
          type="password" 
          id="confirmPassword" 
          placeholder="Confirm new password" 
          required 
        />
        <span 
          class="toggle-password" 
          onclick="toggleVisibility('confirmPassword', this)"
        >👁️</span>
      </div>

      <!-- Button -->
      <button type="submit" class="submit-btn">
        Reset Password
      </button>

    </form>

    <!-- Message -->
    <p id="message" class="message-text"></p>

  </div>

</main>


<!-- ================= FOOTER ================= -->
<footer>
  <p>&copy; 2025 IGNOU University. All rights reserved.</p>
</footer>


<!-- ================= JS ================= -->
<script src="js/config.js"></script>
<script src="js/reset_password.js" defer></script>
<script src="js/threedotmenu.js"></script>

</body>
</html>
